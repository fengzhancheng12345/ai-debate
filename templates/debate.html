<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 辩论系统</title>
<style>
:root {
  --bg: #0a0a14;
  --bg2: #0f0f1e;
  --bg3: #161628;
  --text: #e0e0f0;
  --text2: #8888aa;
  --border: #2a2a4a;
  --accent: #6c63ff;
  --accent2: #ff6b6b;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --purple: #a78bfa;
  --cyan: #22d3ee;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  height: 52px;
}
.header h1 { font-size: 18px; font-weight: 600; color: var(--accent); }
.header .status { font-size: 12px; color: var(--text2); margin-left: auto; }

.main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
  height: calc(100vh - 52px);
}

/* LEFT: Debate area - THIS is the scrollable region */
.debate-area {
  flex: 1 1 auto;
  overflow-y: scroll;
  overflow-x: hidden;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-height: 0;
  height: 100%;
  scroll-behavior: smooth;
  align-content: flex-start;
}

/* RIGHT: Input panel */
.input-panel {
  width: 340px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  height: 100%;
  overflow: hidden;
}

.phase-banner {
  background: linear-gradient(135deg, var(--accent), var(--purple));
  color: white;
  padding: 12px 20px;
  border-radius: 12px;
  text-align: center;
  font-weight: 600;
  font-size: 15px;
  animation: fadeSlide 0.4s ease;
}

.groups-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.group-badge {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  color: var(--text2);
}
.group-badge.active { border-color: var(--accent); color: var(--accent); }
.group-badge.done { border-color: var(--green); color: var(--green); }

.group-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  animation: fadeSlide 0.3s ease;
  flex-shrink: 0;
}
.group-header {
  background: var(--bg3);
  padding: 12px 16px;
  font-weight: 600;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.group-desc { font-size: 12px; color: var(--text2); font-weight: 400; margin-left: auto; }

.agent-entry {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  animation: fadeSlide 0.3s ease;
  flex-shrink: 0;
}
.agent-entry:last-child { border-bottom: none; }

.agent-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.agent-name { font-weight: 600; font-size: 14px; }
.agent-role { font-size: 11px; color: var(--text2); background: var(--bg); padding: 2px 8px; border-radius: 10px; }
.agent-content {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: break-word;
  max-width: 100%;
}
.agent-content code {
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Fira Code', monospace;
  font-size: 13px;
  white-space: pre-wrap;
  word-break: break-all;
}

.round-marker {
  text-align: center;
  color: var(--text2);
  font-size: 12px;
  padding: 4px;
}
.round-marker::before, .round-marker::after {
  content: '──';
  margin: 0 8px;
  color: var(--border);
}

/* Research card - shown during data gathering phase */
.research-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  animation: fadeSlide 0.3s ease;
}
.research-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  font-weight: 600;
  font-size: 14px;
  color: var(--cyan);
}
.sources-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
  margin-top: 8px;
}
.source-badge {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.source-badge.done { border-color: var(--cyan); color: var(--cyan); }
.source-badge .check { color: var(--green); }
.source-badge .spinner { border: 1.5px solid var(--border); border-top-color: var(--cyan); }

/* Voting section */
.voting-section { margin-top: 8px; }
.vote-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg3);
  border-radius: 10px;
  margin-bottom: 6px;
}
.vote-emoji { font-size: 18px; }
.vote-name { font-size: 13px; font-weight: 500; flex: 1; }
.vote-tag {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: 10px;
}
.vote-tag.sup { background: rgba(74,222,128,0.15); color: var(--green); }
.vote-tag.against { background: rgba(248,113,113,0.15); color: var(--red); }
.vote-tag.neutral { background: rgba(251,191,36,0.15); color: var(--yellow); }
.vote-reason { font-size: 12px; color: var(--text2); margin-top: 2px; }
.group-result {
  background: linear-gradient(135deg, rgba(108,99,255,0.1), rgba(167,139,250,0.1));
  border: 1px solid var(--accent);
  border-radius: 10px;
  padding: 10px 14px;
  text-align: center;
  font-weight: 600;
  color: var(--accent);
  margin-top: 8px;
}

/* Final answer */
.final-card {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 2px solid var(--accent);
  border-radius: 20px;
  padding: 24px;
  margin-top: 8px;
  animation: fadeSlide 0.5s ease;
}
.final-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.final-content {
  font-size: 15px;
  line-height: 1.9;
  white-space: pre-wrap;
  color: var(--text);
}
.final-content h2 { color: var(--yellow); font-size: 15px; margin: 12px 0 6px; }
.final-content h3 { color: var(--cyan); font-size: 14px; margin: 10px 0 4px; }

/* RIGHT: User input panel */

.input-panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 14px;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
}

.input-form {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
  flex: 1;
}

/* Dynamic form styles */
#topicInputArea > div {
  margin-bottom: 4px;
}
#topicInputArea label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  font-weight: 500;
  margin-bottom: 5px;
}
#topicInput {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 8px 10px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
#topicInput:focus { border-color: var(--accent); }

#dynamicFieldsContainer > div {
  margin-bottom: 12px;
}
#dynamicFieldsContainer label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  font-weight: 500;
  margin-bottom: 5px;
}
#dynamicFieldsContainer label .field-desc {
  font-weight: 400;
  color: var(--text2);
  font-size: 11px;
  margin-left: 4px;
}
#dynamicFieldsContainer input[type="text"],
#dynamicFieldsContainer textarea,
#dynamicFieldsContainer select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 8px 10px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
#dynamicFieldsContainer input[type="text"]:focus,
#dynamicFieldsContainer textarea:focus,
#dynamicFieldsContainer select:focus {
  border-color: var(--accent);
}
#dynamicFieldsContainer textarea {
  resize: vertical;
  min-height: 60px;
}

.btn {
  flex: 1;
  padding: 9px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-primary:hover { background: #5b52e0; transform: translateY(-1px); }
.btn-primary:disabled { background: var(--border); color: var(--text2); cursor: not-allowed; transform: none; }
.btn-secondary {
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); }

/* Debate status in input panel */
.debate-status {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.status-item {
  background: var(--bg3);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-item.active { border-left: 3px solid var(--accent); color: var(--accent); }
.status-item.done { border-left: 3px solid var(--green); color: var(--green); }
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
}
.status-item.active .status-dot { background: var(--accent); animation: pulse 1.5s infinite; }
.status-item.done .status-dot { background: var(--green); }
.spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div class="header">
  <h1>🤖 AI 辩论系统</h1>
  <div class="status" id="statusText">就绪 — 输入话题开始辩论</div>
</div>

<div class="main">
  <!-- LEFT: Debate content -->
  <div class="debate-area" id="debateArea">
    <div style="text-align:center;padding:60px 20px;color:var(--text2);">
      <div style="font-size:48px;margin-bottom:16px;">💬</div>
      <div>输入话题，点击「发起辩论」</div>
      <div style="font-size:13px;margin-top:8px;">AI 角色将临时创建，围绕话题展开真实辩论</div>
    </div>
  </div>

  <!-- RIGHT: Input panel -->
  <div class="input-panel">
    <div class="input-panel-header">📝 发起辩论</div>
    
    <div class="input-form">
      
      <!-- Step 1: Topic input (always visible initially) -->
      <div id="topicInputArea">
        <div>
          <label>核心话题 <span style="color:var(--red)">*</span></label>
          <input type="text" id="topicInput" placeholder="输入你想辩论的话题，如：现在买电车合适吗"
                 onkeydown="if(event.key==='Enter'){event.preventDefault();analyzeTopic();}" />
        </div>
        <button class="btn btn-primary" id="analyzeBtn" onclick="analyzeTopic()" style="margin-top:12px;width:100%;padding:10px;font-size:15px;">
          🤖 开始分析话题
        </button>
        <p style="font-size:11px;color:var(--text2);margin-top:8px;text-align:center;">
          输入话题后，AI会分析需要哪些背景信息
        </p>
      </div>
      
      <!-- Step 2: Dynamic form (shown after analysis) -->
      <div id="dynamicFormArea" style="display:none;">
        <div id="analyzedTopicBanner" style="font-size:12px;color:var(--green);font-weight:600;margin-bottom:10px;word-break:break-all;"></div>
        
        <div id="dynamicFieldsContainer">
          <!-- Fields are generated dynamically by JavaScript -->
        </div>
        
        <div style="margin-top:14px;">
          <button class="btn btn-primary" id="startDebateBtn" onclick="startDebate()" style="width:100%;padding:10px;font-size:15px;">
            🚀 开始辩论
          </button>
          <button onclick="resetForm()" style="width:100%;margin-top:8px;background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;">
            ← 换一个话题
          </button>
        </div>
      </div>
      
    </div>
    
    <div class="input-panel-header" style="border-top:1px solid var(--border);font-size:13px;">📡 实时进度</div>
    <div class="debate-status" id="statusArea">
      <div class="status-item" style="color:var(--text2);">
        <div class="status-dot"></div>
        等待发起辩论...
      </div>
    </div>
  </div>
</div>

<script>
let currentSession = null;
let evtSource = null;
let isRunning = false;
let activeGroups = {};
let currentRound = 0;

// Dynamic form state
let currentTopic = '';
let currentFields = [];

// ==================== DYNAMIC FORM FUNCTIONS ====================

async function analyzeTopic() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) { alert('请输入话题'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px;"></div> AI分析中...';

  try {
    const resp = await fetch('/api/debate/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({topic})
    });
    const data = await resp.json();
    
    if (data.error) {
      alert('分析失败: ' + data.error);
      return;
    }
    
    currentTopic = topic;
    currentFields = data.fields || [];
    renderDynamicForm(currentFields);
    
    // Switch to step 2 - show the dynamic form
    document.getElementById('topicInputArea').style.display = 'none';
    document.getElementById('dynamicFormArea').style.display = 'block';
    document.getElementById('analyzedTopicBanner').textContent = '✓ ' + topic;
    
    // Scroll input panel to top
    document.querySelector('.input-form').scrollTop = 0;
    
  } catch(err) {
    alert('分析出错: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🤖 重新分析话题';
  }
}

function renderDynamicForm(fields) {
  const container = document.getElementById('dynamicFieldsContainer');
  container.innerHTML = '';
  
  fields.forEach(field => {
    const div = document.createElement('div');
    
    const label = document.createElement('label');
    label.innerHTML = field.label + (field.description ? '<span class="field-desc">— ' + field.description + '</span>' : '');
    
    let input = '';
    
    if (field.type === 'select') {
      const opts = (field.options || []).map(opt => 
        '<option value="' + opt + '">' + opt + '</option>'
      ).join('');
      input = '<select id="field_' + field.key + '" name="' + field.key + '">' + opts + '</select>';
    } else if (field.type === 'textarea') {
      input = '<textarea id="field_' + field.key + '" name="' + field.key + '" ' +
        'rows="2" placeholder="' + (field.placeholder || '') + '"></textarea>';
    } else {
      input = '<input type="text" id="field_' + field.key + '" name="' + field.key + '" ' +
        'placeholder="' + (field.placeholder || '') + '" />';
    }
    
    div.appendChild(label);
    div.insertAdjacentHTML('beforeend', input);
    container.appendChild(div);
  });
}

function resetForm() {
  currentTopic = '';
  currentFields = [];
  document.getElementById('topicInputArea').style.display = 'block';
  document.getElementById('dynamicFormArea').style.display = 'none';
  document.getElementById('topicInput').value = '';
  document.getElementById('dynamicFieldsContainer').innerHTML = '';
  document.querySelector('.input-form').scrollTop = 0;
}

// ==================== DEBATE FUNCTIONS ====================

function startDebate() {
  const topic = currentTopic || document.getElementById('topicInput').value.trim();
  if (!topic) { alert('请先输入话题'); return; }

  // Collect all field values into structured format
  const parts = [topic];
  
  currentFields.forEach(field => {
    const el = document.getElementById('field_' + field.key);
    if (el) {
      const val = el.value.trim();
      if (val) {
        parts.push('【' + field.label + '】' + val);
      }
    }
  });
  
  const user_input = parts.join('\n');

  if (evtSource) { evtSource.close(); evtSource = null; }

  document.getElementById('debateArea').innerHTML = '';
  document.getElementById('statusArea').innerHTML = '';
  currentSession = null;
  activeGroups = {};
  currentRound = 0;
  isRunning = true;

  document.getElementById('analyzeBtn').disabled = true;
  const startDebateBtn = document.getElementById('startDebateBtn');
  if (startDebateBtn) startDebateBtn.disabled = true;
  document.getElementById('topicInput').disabled = true;
  document.getElementById('statusText').textContent = '⚡ 初始化辩论...';

  fetch('/api/debate/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({topic, user_input: user_input})
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) { showError(data.error); return; }
    currentSession = data.session_id;
    document.getElementById('statusText').textContent = '🔄 辩论进行中...';
    connectStream(currentSession);
  })
  .catch(err => { showError('启动失败: ' + err.message); resetUI(); });
}

function connectStream(sessionId) {
  evtSource = new EventSource('/api/debate/' + sessionId + '/stream');

  evtSource.onmessage = function(e) {
    try {
      const evt = JSON.parse(e.data);
      handleEvent(evt);
    } catch(err) {
      console.error('Parse error:', err, e.data);
    }
  };

  evtSource.onerror = function() {
    if (isRunning) { addStatus('❌ 连接中断', 'error'); isRunning = false; }
    evtSource.close();
    resetUI();
  };

  evtSource.addEventListener('stream_end', function() {
    isRunning = false;
    evtSource.close();
    addStatus('✅ 辩论完成', 'done');
    document.getElementById('statusText').textContent = '✅ 辩论已完成';
    resetUI();
  });
}

function handleEvent(evt) {
  const t = evt.type;
  const d = evt.data || evt;

  if (t === 'ping') return;
  if (t === 'error') { showError(d.message); return; }
  if (t === 'stream_end') return;

  if (t === 'phase') { addPhaseBanner(d.title); addStatus(d.phase + ' 阶段', 'active'); }
  else if (t === 'planner_message') { addPhaseBanner('🧠 主策划: ' + d.content.substring(0, 100)); }
  else if (t === 'groups_created') { handleGroupsCreated(d); }
  else if (t === 'researching') { handleResearching(d); }
  else if (t === 'research_complete') { handleResearchComplete(d); }
  else if (t === 'round_start') { currentRound = d.round; addPhaseBanner('🔄 第 ' + d.round + ' 轮讨论 — ' + d.title); addStatus('第 ' + d.round + ' 轮进行中', 'active'); }
  else if (t === 'agent_start') { handleAgentStart(d); }
  else if (t === 'agent_message') { handleAgentMessage(d); }
  else if (t === 'group_round_done') { markGroupDone(d.group_id); }
  else if (t === 'group_voting') { handleGroupVoting(d); }
  else if (t === 'vote_cast') { handleVoteCast(d); }
  else if (t === 'group_vote_result') { handleGroupVoteResult(d); }
  else if (t === 'final_answer') { handleFinalAnswer(d); }
  else if (t === 'complete') {
    isRunning = false;
    if (evtSource) evtSource.close();
    document.getElementById('statusText').textContent = '✅ 辩论完成';
    addStatus('辩论全部完成', 'done');
    resetUI();
  }
}

function handleGroupsCreated(d) {
  d.groups.forEach(g => {
    activeGroups[g.id] = { ...g, agents: {}, messages: [], votingDone: false };
  });

  const area = document.getElementById('debateArea');
  area.innerHTML = '';

  const bar = document.createElement('div');
  bar.className = 'groups-bar';
  d.groups.forEach(g => {
    const badge = document.createElement('div');
    badge.className = 'group-badge';
    badge.id = 'badge-' + g.id;
    badge.textContent = g.name;
    bar.appendChild(badge);
  });
  area.appendChild(bar);

  d.groups.forEach(g => {
    const card = document.createElement('div');
    card.className = 'group-card';
    card.id = 'group-' + g.id;
    card.innerHTML =
      '<div class="group-header">' + g.name + ' <span class="group-desc">' + g.description + '</span></div>' +
      '<div class="agents-container" id="agents-' + g.id + '"></div>' +
      '<div class="voting-section" id="voting-' + g.id + '" style="display:none;padding:12px;"></div>' +
      '<div class="group-result" id="result-' + g.id + '" style="display:none;"></div>';
    area.appendChild(card);
  });
}

function handleResearching(d) {
  const area = document.getElementById('debateArea');
  const banner = area.querySelector('.phase-banner');
  if (banner) banner.remove();

  const card = document.createElement('div');
  card.className = 'research-card';
  card.id = 'research-card';
  card.innerHTML =
    '<div class="research-header">' +
    '  <span style="font-size:18px;">🔍</span>' +
    '  <span>正在全网收集真实资料...</span>' +
    '</div>' +
    '<div style="font-size:13px;color:var(--text2);margin-bottom:8px;">' +
    '  实时抓取：网络搜索 · 财经数据 · 学术论文 · 新闻资讯' +
    '</div>' +
    '<div class="sources-grid" id="sources-grid"></div>';

  area.innerHTML = '';
  area.appendChild(card);

  addStatus('收集资料中', 'active');
}

function handleResearchComplete(d) {
  const grid = document.getElementById('sources-grid');
  if (grid && d.sources) {
    grid.innerHTML = '';
    d.sources.forEach(src => {
      const badge = document.createElement('div');
      badge.className = 'source-badge done';
      badge.innerHTML = '<span class="check">✓</span><span>' + src + '</span>';
      grid.appendChild(badge);
    });
  }
  addStatus('资料收集完成', 'done');
}

function handleAgentStart(d) {
  const container = document.getElementById('agents-' + d.group_id);
  if (!container) return;

  const entry = document.createElement('div');
  entry.className = 'agent-entry';
  entry.id = 'agent-entry-' + d.group_id + '-' + d.agent_key;
  entry.innerHTML =
    '<div class="agent-meta">' +
    '<span style="font-size:16px;">' + d.emoji + '</span>' +
    '<span class="agent-name" style="color:' + (d.color || '#6366f1') + '">' + d.agent_name + '</span>' +
    '<span class="agent-role">第' + d.round + '轮</span>' +
    '<div class="spinner"></div>' +
    '</div>' +
    '<div class="agent-content" id="agent-content-' + d.group_id + '-' + d.agent_key + '">思考中...</div>';

  container.appendChild(entry);

  const badge = document.getElementById('badge-' + d.group_id);
  if (badge) badge.className = 'group-badge active';
}

function handleAgentMessage(d) {
  const contentEl = document.getElementById('agent-content-' + d.group_id + '-' + d.agent_key);
  if (contentEl) {
    contentEl.innerHTML = formatContent(d.content);
    const entry = document.getElementById('agent-entry-' + d.group_id + '-' + d.agent_key);
    if (entry) {
      const spinner = entry.querySelector('.spinner');
      if (spinner) spinner.remove();
    }
  }
  // User controls their own scroll position - removed auto-scroll
}

function markGroupDone(groupId) {
  const badge = document.getElementById('badge-' + groupId);
  if (badge) badge.className = 'group-badge';
}

function handleGroupVoting(d) {
  const votingEl = document.getElementById('voting-' + d.group_id);
  if (votingEl) {
    votingEl.style.display = 'block';
    votingEl.innerHTML = '<div style="font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;"><div class="spinner"></div>投票中...</div>';
  }
  addStatus(d.group_name + ' 投票中', 'active');
}

function handleVoteCast(d) {
  const votingEl = document.getElementById('voting-' + d.group_id);
  if (!votingEl) return;

  const spinner = votingEl.querySelector('.spinner');
  if (spinner) spinner.parentElement.remove();

  const voteClass = d.vote === '支持' ? 'sup' : d.vote === '反对' ? 'against' : 'neutral';
  const voteCard = document.createElement('div');
  voteCard.className = 'vote-card';
  const icon = d.vote === '支持' ? '👍' : d.vote === '反对' ? '👎' : '🤔';
  voteCard.innerHTML =
    '<span class="vote-emoji">' + icon + '</span>' +
    '<span class="vote-name">' + d.agent_name + '</span>' +
    '<span class="vote-tag ' + voteClass + '">' + d.vote + '</span>';

  if (!votingEl.querySelector('.vote-card')) votingEl.innerHTML = '';
  votingEl.appendChild(voteCard);
}

function handleGroupVoteResult(d) {
  const resultEl = document.getElementById('result-' + d.group_id);
  if (resultEl) {
    resultEl.style.display = 'block';
    const icon = d.group_vote === '支持' ? '✅' : d.group_vote === '反对' ? '❌' : '⚖️';
    resultEl.innerHTML = icon + ' ' + d.group_name + ' 共识: <strong>' + d.group_vote + '</strong>';
  }
  const badge = document.getElementById('badge-' + d.group_id);
  if (badge) badge.className = 'group-badge done';
}

function handleFinalAnswer(d) {
  const area = document.getElementById('debateArea');

  let votesHtml = '<div style="margin-bottom:20px;"><h3 style="color:var(--yellow);margin-bottom:10px;font-size:14px;">📊 投票结果</h3>';
  d.groups_summary.forEach(g => {
    votesHtml += '<div style="margin-bottom:8px;font-size:13px;"><strong>' + g.name + ':</strong> ';
    g.members.forEach(m => {
      const cls = m.vote === '支持' ? 'sup' : m.vote === '反对' ? 'against' : 'neutral';
      votesHtml += '<span class="vote-tag ' + cls + '" style="margin-right:4px;">' + m.emoji + ' ' + m.name + '=' + m.vote + '</span>';
    });
    votesHtml += ' → 共识: <strong>' + g.vote + '</strong></div>';
  });
  votesHtml += '</div>';

  const card = document.createElement('div');
  card.className = 'final-card';
  card.innerHTML =
    '<div class="final-title">🎯 主策划最终总结</div>' +
    '<div class="final-content">' + formatContent(d.summary) + '</div>' +
    votesHtml;
  area.appendChild(card);
}

function addPhaseBanner(text) {
  const area = document.getElementById('debateArea');
  const existing = area.querySelector('.phase-banner');
  if (existing) existing.remove();
  const banner = document.createElement('div');
  banner.className = 'phase-banner';
  banner.textContent = text;
  area.insertBefore(banner, area.firstChild);
}

function addStatus(text, type) {
  const area = document.getElementById('statusArea');
  const item = document.createElement('div');
  item.className = 'status-item ' + (type === 'active' ? 'active' : type === 'done' ? 'done' : '');
  const dot = type === 'active' ? '<div class="spinner"></div>' : '<div class="status-dot"></div>';
  item.innerHTML = dot + text;
  area.appendChild(item);
}

function showError(msg) {
  const area = document.getElementById('debateArea');
  const err = document.createElement('div');
  err.style = 'background:rgba(248,113,113,0.1);border:1px solid var(--red);border-radius:12px;padding:16px;color:var(--red);margin:8px;';
  err.textContent = '错误: ' + msg;
  area.appendChild(err);
}

function resetUI() {
  const analyzeBtn = document.getElementById('analyzeBtn');
  if (analyzeBtn) analyzeBtn.disabled = false;
  const startDebateBtn = document.getElementById('startDebateBtn');
  if (startDebateBtn) startDebateBtn.disabled = false;
  const topicInput = document.getElementById('topicInput');
  if (topicInput) topicInput.disabled = false;
}

function stopDebate() {
  if (evtSource) { evtSource.close(); evtSource = null; }
  isRunning = false;
  addStatus('已停止', '');
  document.getElementById('statusText').textContent = '已停止';
  resetUI();
}

function formatContent(text) {
  if (!text) return '';
  text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  text = text.replace(/^## (.+)$/gm, '<h2 style="color:var(--yellow);margin:10px 0 4px;font-size:15px;">$1</h2>');
  text = text.replace(/^### (.+)$/gm, '<h3 style="color:var(--cyan);margin:8px 0 3px;font-size:14px;">$1</h3>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/```([\s\S]*?)```/g, '<pre style="background:var(--bg);padding:10px;border-radius:8px;overflow-x:auto;margin:8px 0;"><code>$1</code></pre>');
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\n\n/g, '</p><p style="margin:6px 0;">');
  text = text.replace(/\n/g, '<br>');
  return '<p style="margin:6px 0;">' + text + '</p>';
}
</script>
</body>
</html>
